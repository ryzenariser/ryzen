<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ryzen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold-l:#E2C27D;--gold-d:#9E7C2E;
  --black:#0D0D0D;--dark:#111;--dark2:#1A1A1A;
  --bone:#F5F3EE;--bone2:#EDE8DF;--white:#fff;
  --gray:#888;--gray2:#ccc;--t:.25s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--white);color:var(--dark)}
a{text-decoration:none;color:inherit}
img{max-width:100%;height:auto}

.logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;letter-spacing:7px;color:var(--gold);text-transform:uppercase}

#hdr{background:var(--white);border-bottom:1px solid rgba(0,0,0,.07);position:sticky;top:0;z-index:900}
.hdr-in{max-width:1000px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between}
.back-link{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--dark);transition:color var(--t)}
.back-link:hover{color:var(--gold)}

main{max-width:760px;margin:0 auto;padding:64px 28px 100px}
.page-eyebrow{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.page-title{font-family:'Montserrat',sans-serif;font-size:clamp(28px,4vw,42px);font-weight:900;text-transform:uppercase;line-height:1.1;margin-bottom:36px}
.page-body{font-size:15px;line-height:1.9;color:#333}
.page-body h1,.page-body h2,.page-body h3{font-family:'Montserrat',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin:32px 0 14px}
.page-body p{margin-bottom:16px}
.page-body img{margin:24px 0}
.page-body a{color:var(--gold-d);text-decoration:underline}

.block{margin-bottom:40px}
.block-h{font-family:'Montserrat',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--dark);margin-bottom:10px}
.block-b{font-size:14.5px;line-height:1.85;color:#333;white-space:pre-wrap}

.state-msg{text-align:center;padding:120px 20px}
.state-eyebrow{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.state-title{font-family:'Montserrat',sans-serif;font-size:26px;font-weight:900;text-transform:uppercase;margin-bottom:14px}
.state-p{font-size:13px;color:var(--gray);margin-bottom:26px}
.btn{display:inline-flex;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:14px 28px;background:var(--gold);color:var(--black);border:2px solid var(--gold);transition:var(--t)}
.btn:hover{background:var(--gold-l);border-color:var(--gold-l)}

footer{background:var(--dark2);padding:40px 28px;text-align:center;color:rgba(245,243,238,.5);font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:1px}
</style>
</head>
<body>

<header id="hdr">
  <div class="hdr-in">
    <a href="/" class="logo" style="font-size:20px;letter-spacing:5px">Ryzen</a>
    <a href="/" class="back-link">&larr; Back to Shop</a>
  </div>
</header>

<main id="content">
  <div class="state-msg">
    <div class="state-eyebrow">Loading</div>
    <div class="state-title">Please wait…</div>
  </div>
</main>

<footer>&copy; <span id="fyear"></span> Ryzen. All rights reserved.</footer>

<script>
document.getElementById('fyear').textContent = new Date().getFullYear();

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, function(c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

function renderNotFound() {
  document.title = 'Page Not Found — Ryzen';
  document.getElementById('content').innerHTML =
    '<div class="state-msg">' +
      '<div class="state-eyebrow">404</div>' +
      '<div class="state-title">Page Not Found</div>' +
      '<div class="state-p">The page you\'re looking for doesn\'t exist or may have been removed.</div>' +
      '<a href="/" class="btn">Return Home</a>' +
    '</div>';
}

function renderError() {
  document.title = 'Ryzen';
  document.getElementById('content').innerHTML =
    '<div class="state-msg">' +
      '<div class="state-eyebrow">Error</div>' +
      '<div class="state-title">Something Went Wrong</div>' +
      '<div class="state-p">We could not load this page right now. Please try again shortly.</div>' +
      '<a href="/" class="btn">Return Home</a>' +
    '</div>';
}

function renderPage(page) {
  document.title = page.title + ' — Ryzen';
  var html = '<p class="page-eyebrow">Ryzen</p><h1 class="page-title">' + escapeHtml(page.title) + '</h1>';

  if (page.type === 'dynamic' && Array.isArray(page.blocks) && page.blocks.length) {
    html += page.blocks.map(function(b) {
      return '<div class="block">' +
        (b.heading ? '<div class="block-h">' + escapeHtml(b.heading) + '</div>' : '') +
        '<div class="block-b">' + escapeHtml(b.body || '') + '</div>' +
      '</div>';
    }).join('');
  } else {
    // Static pages store trusted HTML entered by the admin — rendered as-is.
    html += '<div class="page-body">' + (page.html || '') + '</div>';
  }

  document.getElementById('content').innerHTML = html;
}

(function loadPage() {
  var slug = location.pathname.replace(/^\/+/, '').replace(/\/+$/, '');
  if (!slug) { renderNotFound(); return; }

  fetch('/api/pages?action=get&slug=' + encodeURIComponent(slug))
    .then(function(res) {
      // pages.js currently returns 500 (not 404) when a slug has no match,
      // since Supabase's .single() throws on zero rows. Treat any failed
      // response here as "page not found" rather than a hard error.
      if (!res.ok) { renderNotFound(); return null; }
      return res.json();
    })
    .then(function(data) {
      if (!data) return;
      if (!data.page) { renderNotFound(); return; }
      renderPage(data.page);
    })
    .catch(function() { renderError(); });
})();
</script>

</body>
</html>
